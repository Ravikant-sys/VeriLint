<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verilint | Automated Verilog Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="glow glow-purple"></div>
        <div class="glow glow-blue"></div>
    </div>

    <div class="app-container">
        <header>
            <div class="logo">
                <div class="logo-icon">V</div>
                <h1>Verilint Core Engine</h1>
            </div>
            <p class="subtitle">AI-Powered Verilog Linter & Refactoring Tool</p>
        </header>

        <main class="dashboard">
            <section class="editor-section panel glass">
                <div class="panel-header">
                    <h2>Input Verilog Code</h2>
                    <div class="actions">
                        <button class="btn btn-secondary" id="clearBtn">Clear</button>
                        <button class="btn btn-primary" id="analyzeBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            Analyze
                        </button>
                    </div>
                </div>
                <div class="editor-container">
                    <div class="line-numbers" id="lineNumbers">1</div>
                    <textarea id="codeEditor" spellcheck="false" placeholder="// Paste your Verilog module block here...&#10;&#10;module example (&#10;    input wire clk,&#10;    input wire rst,&#10;    output reg [7:0] q&#10;);&#10;&#10;always @(posedge clk) begin&#10;    if (rst)&#10;        q = 8'd0;    // Bug: mixed assignment&#10;    else&#10;        q <= q + 1;&#10;end&#10;&#10;endmodule"></textarea>
                </div>
            </section>

            <section class="results-section panel glass">
                <div class="panel-header">
                    <h2>Analysis Results</h2>
                    <span class="status-badge idle" id="engineStatus">Awaiting Input</span>
                </div>
                <div class="results-container" id="resultsContainer">
                    <div class="empty-state">
                        <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        <p>Submit code to run Phase 1 (Parsing), Phase 2 (Rule Engine), and Phase 3 (AI Refactoring).</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
